# Plugin manager for tmux
set -g @plugin 'tmux-plugins/tpm'
# Sensible tmux defaults
set -g @plugin 'tmux-plugins/tmux-sensible'
# One Dark Pro theme for tmux
set -g @plugin 'evanzhoudev/onedarkpro-tmux'
# Session management for tmux
set -g @plugin 'omerxx/tmux-sessionx'
# Fuzzy finder integration for tmux
set -g @plugin 'sainnhe/tmux-fzf'
# URL fuzzy finder for tmux
set -g @plugin 'wfxr/tmux-fzf-url'

# Delay before status line disappears
set -g @transient-status-delay '0.5'
# Stall time for transient status line
set -g @transient-status-stall '2.5'

# Set default terminal to tmux-256color
set -g default-terminal "tmux-256color"
# Override terminal settings for xterm-256color
set -ga terminal-overrides ",xterm-256color:RGB"
# Enable system clipboard integration
set -g set-clipboard on
# Set the cursor to follow alacritty
set -as terminal-overrides ',*:Ss=\E[%p1%d q:Se=\E[2 q'

# Initialize tmux plugin manager
run '~/.config/tmux/plugins/tpm/tpm'

# Enable mouse support
set -g mouse on

# Set prefix key to Ctrl-Space
unbind C-b
set -g prefix C-Space
bind C-Space send-prefix

# Set prefix+n to open a new window
bind n new-window
# Set prefix+w to close the current window
bind w kill-window

# Start window and pane numbering at 1
set -g base-index 1
set -g pane-base-index 1
set-window-option -g pane-base-index 1
# Renumber windows automatically
set-option -g renumber-windows on

# Set Shift+Option+Left/Right to switch windows
bind -n S-M-Left  previous-window
bind -n S-M-Right next-window

# Set prefix+- to split window vertically
bind - split-window -v -c "#{pane_current_path}"
# Set prefix+\('|') to split window horizontally
bind '\' split-window -h -c "#{pane_current_path}"

# Set x to kill the current pane without confirmation
bind-key x kill-pane

# Status line style aligned with One Dark / lualine
set -g status on
set -g focus-events on
set -g status-interval 2
set -g status-justify left
set -g status-style 'fg=#abb2bf,bg=default'
set -g status-left-length 60
set -g status-right-length 280
set -gq @nvim_mode ''
set -gq @nvim_branch ''
set -gq @nvim_filetype ''
set -gq @nvim_pos ''
set -g status-left '#[fg=#98c379,bg=default,bold] 󱂬 #S '
set -g status-right '#[fg=#61afef,bg=default,bold] #{?client_prefix,󰌌 PREFIX,󰌐} #[fg=#e5c07b,bg=default,bold]  #{pane_current_command}#[fg=#7f848e,bg=default]#{?@nvim_mode, │ ,}#[fg=#98c379,bg=default,bold]#{@nvim_mode} #[fg=#61afef,bg=default,bold]#{@nvim_branch} #[fg=#e5c07b,bg=default,bold]#{@nvim_filetype} #[fg=#56b6c2,bg=default,bold]#{@nvim_pos}  '
set -g window-status-format '#[fg=#7f848e,bg=default] #I  #W#{?window_flags, #{window_flags},} '
set -g window-status-current-format '#[fg=#e5c07b,bg=default,bold] #I  #W#{?window_flags, #{window_flags},} '
set -g window-status-activity-style 'fg=#61afef,bg=default,bold'
set -g window-status-bell-style 'fg=#e06c75,bg=default,bold'
set -g message-style 'fg=#abb2bf,bg=default'
set -g message-command-style 'fg=#61afef,bg=default,bold'

# Set pane border styles
set -g pane-active-border-style 'fg=#61afef,bg=default'
set -g pane-border-style 'fg=#3e4452,bg=default'

# FZF URL plugin options for sessionx manager
set -g @fzf-url-fzf-options '-p 60%,30% --prompt="   " --border-label=" Open URL "'
set -g @fzf-url-history-limit '2000'

# Sessionx plugin options (windows and tmux sessions manager)
set -g @sessionx-auto-accept 'off'
set -g @sessionx-bind 'o'
set -g @sessionx-window-height '85%'
set -g @sessionx-window-width '75%'
set -g @sessionx-zoxide-mode 'on'
set -g @sessionx-custom-paths-subdirectories 'false'
set -g @sessionx-filter-current 'false'

# Settings for yazi image preview in iTerm2, VSCode terminal and Ghostty
set -g allow-passthrough on
set -ga update-environment TERM
set -ga update-environment TERM_PROGRAM

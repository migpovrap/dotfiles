[env]
TERM = "xterm-256color"

[window]
padding.x = 8
padding.y = 19
dynamic_padding = true

opacity = 0.8
blur = false

decorations = "Transparent"
dynamic_title = false

[font]
normal = { family = "JetBrainsMono Nerd Font", style = "Medium" }
size = 13.5

[cursor.style]
shape = "Beam"
blinking = "On"

[general]
import = [
  "~/.config/alacritty/materialdarker.toml"
]

live_config_reload = true

[mouse]
hide_when_typing = true
